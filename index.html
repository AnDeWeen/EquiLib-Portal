<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EquiLib | Project Genesis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#121212] text-slate-300 h-screen w-screen flex flex-col items-center justify-center overflow-hidden">
    <div class="flex flex-col items-center max-w-md w-full px-6 space-y-8">
        <div class="text-center space-y-2">
            <h1 class="text-5xl font-extrabold tracking-tight text-white">EquiLib</h1>
            <p class="text-sm font-semibold tracking-widest text-slate-500 uppercase">Project Genesis System Interface</p>
        </div>
        <div class="w-full bg-slate-800/50 border border-slate-700 rounded-lg p-5 space-y-3">
            <div class="flex justify-between items-center">
                <span class="text-sm font-medium text-slate-400">Network:</span>
                <span class="text-sm font-bold text-red-500 flex items-center gap-2"><i data-lucide="wifi-off" class="w-4 h-4"></i> OFFLINE</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-sm font-medium text-slate-400">Local Cache:</span>
                <span class="text-sm font-bold text-emerald-400 flex items-center gap-2"><i data-lucide="database" class="w-4 h-4"></i> READY</span>
            </div>
        </div>
        <a href="#" class="group w-full flex items-center justify-center gap-3 bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 px-8 rounded-lg shadow-[0_0_15px_rgba(37,99,235,0.5)] transition-all duration-300">
            <span>ACCESS SYSTEM</span>
            <i data-lucide="arrow-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
        </a>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
