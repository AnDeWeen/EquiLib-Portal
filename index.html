        /* Barcode Scanner Reticle Overlay */
        .scanner-reticle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 120px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            z-index: 10;
        }

        .scanner-reticle::before,
        .scanner-reticle::after {
            content: '';
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: #eab308;
            /* Tailwind amber-500 / yellow */
            border-style: solid;
            border-width: 0;
        }

        .scanner-reticle::before {
            top: -2px;
            left: -2px;
            border-top-width: 4px;
            border-left-width: 4px;
            border-top-left-radius: 12px;
        }

        .scanner-reticle::after {
            bottom: -2px;
            right: -2px;
            border-bottom-width: 4px;
            border-right-width: 4px;
            border-bottom-right-radius: 12px;
        }

        .scanner-reticle-br,

            position: absolute;
            width: 40px;
            height: 40px;
            border-color: #eab308;

    <script>
        // Ask for camera permission immediately when app opens (required for mobile)
        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => { stream.getTracks().forEach(t => t.stop()); }) // Release right away
                .catch(err => { console.warn("Camera permission denied:", err); });
        }

        let API_BASE = window.location.origin + '/api';

        // Detect if running as Native Android (Capacitor or File)
        const isStandalone = window.location.protocol === 'file:' || window.location.hostname === 'localhost' || !!window.Capacitor;
        
        // Check URL for dynamic IP from QuickStart Launcher
        const urlParams = new URLSearchParams(window.location.search);
        const urlIp = urlParams.get('ip');
        if (urlIp) {
            localStorage.setItem('EquiLib_ServerIP', urlIp);
            window.history.replaceState({}, document.title, window.location.pathname);
        }
        
        const savedIp = localStorage.getItem('EquiLib_ServerIP');

        window.resetServerIp = () => {
            localStorage.removeItem('EquiLib_ServerIP');
            window.location.reload();
        };

        if (!savedIp && window.location.hostname !== 'localhost') {
            window.addEventListener('DOMContentLoaded', () => {
                const overlay = document.createElement('div');
                overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:#121212;z-index:9999999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;font-family:sans-serif;padding:20px;box-sizing:border-box;';
                overlay.innerHTML = `
                    <h1 style="color:#f59e0b;font-size:24px;margin-bottom:10px;text-align:center;">Connect to Server</h1>
                    <p style="margin-bottom:20px;text-align:center;color:#9ca3af;font-size:14px;">Scan the QR Code on the PC or enter the IP Address to connect.</p>
                    
                    <div id="qr-reader-container" style="width:100%;max-width:300px;margin-bottom:20px;border-radius:10px;overflow:hidden;background:black;"></div>
                    
                    <p style="margin-bottom:10px;font-size:14px;color:#9ca3af;">Or Enter Manually:</p>
                    <input type="text" id="manual-ip-input" placeholder="e.g. 192.168.1.6:5007" style="padding:12px;border-radius:8px;border:1px solid #333;background:#1E1E1E;color:white;width:100%;max-width:300px;margin-bottom:15px;outline:none;">
                    
                    <button id="btn-manual-connect" style="background:#f59e0b;color:black;font-weight:bold;padding:12px 24px;border:none;border-radius:8px;width:100%;max-width:300px;cursor:pointer;">Connect</button>
                    <button id="btn-localhost-connect" style="margin-top:10px;background:transparent;color:#9ca3af;font-size:12px;border:none;text-decoration:underline;cursor:pointer;">Use Localhost (for testing)</button>
                `;
                document.body.appendChild(overlay);

                // Start Scanner
                let html5QrcodeScanner = new Html5QrcodeScanner("qr-reader-container", { fps: 10, qrbox: {width: 250, height: 250} }, false);
                html5QrcodeScanner.render((decodedText) => {
                    window.html5QrCodeInstance?.clear();
                    saveAndConnect(decodedText);
                }, () => {});

                document.getElementById('btn-manual-connect').onclick = () => {
                    saveAndConnect(document.getElementById('manual-ip-input').value.trim());
                };
                
                document.getElementById('btn-localhost-connect').onclick = () => {
                   localStorage.setItem('EquiLib_ServerIP', 'localhost:5007');
                   window.location.reload();
                };

                function saveAndConnect(ipText) {
                    if(!ipText) return;
                    ipText = ipText.replace('http://', '').replace('https://', '');
                    if(!ipText.includes(':')) ipText += ':5007'; // default port
                    localStorage.setItem('EquiLib_ServerIP', ipText);
                    window.location.reload();
                }
            });
        } else if (savedIp && window.location.hostname !== 'localhost') {
            API_BASE = `https://${savedIp}/api`;
        }

        const fetchJson = async (url, options = {}) => {
            try {
                // Ensure headers exist
                options.headers = options.headers || {};
                // Bypass localtunnel's anti-phishing HTML intercept page for API fetches
                options.headers['Bypass-Tunnel-Reminder'] = 'true';
                options.headers['ngrok-skip-browser-warning'] = 'true';

                const res = await fetch(url, options);
                let text = await res.text();
                let json;
                try {
                    json = JSON.parse(text);
                } catch (e) {
                    // If it's not JSON (like an HTML error page), reject it
                    throw new Error("API returned non-JSON response: " + text.substring(0, 100));
                }
                if (!res.ok) throw new Error(json.error || json.message || 'HTTP Error ' + res.status);
                return { data: json.data || json, error: json.error };
            } catch (err) {
                return { data: null, error: err };
            }
        };

        window.dbServices = {
            getLocations: () => fetchJson(`${API_BASE}/locations`),
            createLocation: (locData) => fetchJson(`${API_BASE}/locations`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(locData)
            }),
            getItems: () => fetchJson(`${API_BASE}/items`),
            getTransactions: () => fetchJson(`${API_BASE}/transactions`),
            getUsers: () => fetchJson(`${API_BASE}/users`),
            updateItemBorrowedQuantity: (itemId, newQuantity) => fetchJson(`${API_BASE}/items/${itemId}`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({
                    BorrowedQuantity: newQuantity
                })
            }),
            updateItemTotalQuantity: (itemId, newQuantity) => fetchJson(`${API_BASE}/items/${itemId}`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ TotalQuantity: newQuantity })
            }),
            deleteItem: (itemId) => fetchJson(`${API_BASE}/items/${itemId}`, { method: 'DELETE' }),
            updateItem: (itemId, itemData) => fetchJson(`${API_BASE}/items/${itemId}`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(itemData)
            }),
            insertTransaction: async (tx) => {
            return fetchJson(`${API_BASE}/transactions`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    part_id: tx.part_id,
                    user_name: tx.user_name,
                    action: tx.action,
                    timestamp: tx.timestamp
                })
            });
        },
            createItem: (itemData) => fetchJson(`${API_BASE}/items`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(itemData)
            }),
            createUser: (userData) => fetchJson(`${API_BASE}/users`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(userData)
            }),
            updateUser: (userId, userData) => fetchJson(`${API_BASE}/users/${userId}`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(userData)
            }),
            deleteUser: (userId) => fetchJson(`${API_BASE}/users/${userId}`, { method: 'DELETE' }),
            syncStock: () => fetchJson(`${API_BASE}/sync-stock`, { method: 'POST' }),
            subscribeToItems: (callback) => {
                // Mock Realtime Subscription for Local
                return { unsubscribe: () => { } };
            }
        };
    </script>

    <script>
        window.onerror = function (msg, url, line, col, error) {
            document.body.innerHTML += '<div style="color:red; background:white; padding:20px; position:absolute; z-index:9999; top:0; left:0; right:0; font-family:monospace; word-break: break-all;"><b>FATAL ERROR:</b> ' + msg + '<br>Line: ' + line + '<br>Col: ' + col + '<br>Error Obj: ' + (error ? (error.stack || error.message || JSON.stringify(error)) : '') + '</div>';
        };
        window.addEventListener('unhandledrejection', function (event) {
            let reasonStr = 'Unknown';
            if (event.reason) {
                if (event.reason instanceof Error) reasonStr = event.reason.stack || event.reason.message;
                else if (typeof event.reason === 'object') reasonStr = JSON.stringify(event.reason);
                else reasonStr = String(event.reason);
            }
            document.body.innerHTML += '<div style="color:red; background:white; padding:20px; position:absolute; z-index:9999; top:100px; left:0; right:0; font-family:monospace; word-break: break-all;"><b>PROMISE REJECTION:</b> ' + reasonStr + '</div>';
        });
    </script>

        // --- Notification Components ---
        const Notification = ({ notification, onRemove }) => {
            const { useState, useEffect } = React;
            const [isExiting, setIsExiting] = useState(false);
            
            useEffect(() => {
                const timer = setTimeout(() => {
                    setIsExiting(true);
                    setTimeout(() => onRemove(notification.id), 300);
                }, 4000);
                return () => clearTimeout(timer);
            }, []);

            const Icon = notification.type === 'success' ? Icons.Check : 
                         notification.type === 'error' ? Icons.AlertTriangle : Icons.Info;

            return (
                <div className={`notification-item notification-${notification.type} ${isExiting ? 'exit' : ''}`}>
                    <div className="notification-icon">
                        <Icon />
                    </div>
                    <div className="notification-content">
                        <div className="notification-message">{notification.message}</div>
                    </div>
                    <div className="notification-progress" style={{ animation: 'progress 4s linear forwards' }}></div>
                </div>
            );
        };

        const NotificationContainer = ({ notifications, onRemove }) => {
            return (
                <div className="notification-container">
                    {notifications.map(n => (
                        <Notification key={n.id} notification={n} onRemove={onRemove} />
                    ))}
                </div>
            );
        };

                        // We will upload local data to Supabase to prevent data loss.

                        let finalItems = itemData;
                        let finalTransactions = transData;
                        let finalLocations = (locData && locData.length > 0) ? locData : MOCK_LOCATIONS;

                            finalItems = parsedLocalItems;
                            finalUsers = parsedLocalUsers || MOCK_USERS;
                            finalTransactions = parsedLocalTransactions || [];

                                for (let item of finalItems) {
                                    // Remove local 'id' so Supabase generates a real one, or if using explicit IDs, keep them depending on schema
                                    const { id, ...itemToInsert } = item;
                                    window.dbServices.createItem(itemToInsert).catch(e => console.error("Migration err:", e));
                                }
                            }
                        } else {
                            // Normal Flow: Trust Supabase

                            if (!finalTransactions) finalTransactions = [];

                        localStorage.setItem('EquiLib_Transactions', JSON.stringify(finalTransactions));

                    showNotification(t.outOfStockAlert, 'error');
                    return;

                const newBorrowedQty = (item.BorrowedQuantity || 0) + borrowQty;
                const newlyUpdatedItem = { ...item, BorrowedQuantity: newBorrowedQty };

                // Update local state and cache immediately for snappy UX
                const updatedItems = items.map(i => i.id === item.id ? newlyUpdatedItem : i);
                setItems(updatedItems);

                    part_id: item.id,
                    user_name: currentUser ? currentUser.username : 'Unknown',
                    action: borrowQty > 1 ? `BORROW (${borrowQty})` : 'BORROW',
                    timestamp: new Date().toISOString()

                // Save to cache
                localStorage.setItem('EquiLib_Items', JSON.stringify(updatedItems));
                localStorage.setItem('EquiLib_Transactions', JSON.stringify(updatedTransactions));

                if (window.dbServices) {
                    try {
                        const itemRes = await window.dbServices.updateItemBorrowedQuantity(item.id, newBorrowedQty);

                    const base64Content = base64Image.split(',')[1];
                    const promptText = "Analyze this image of a tool, piece of equipment, or object. Respond in JSON format with exactly three fields: 'Name' (the specific brand and model if visible, else generic name), 'Category' (e.g. Power Tools, Hand Tools, Electronics, Consumables, Accessories), and 'Description' (a brief 1-sentence physical description). Return ONLY raw JSON, do not include markdown blocks or any other characters.";

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: promptText }, { inline_data: { mime_type: "image/jpeg", data: base64Content } }] }],
                            generationConfig: { response_mime_type: "application/json" }
                        })
                    });

                    if (!response.ok) throw new Error("API Request Failed");
                    const result = await response.json();

                    const textResult = result.candidates[0].content.parts[0].text;
                    const aiData = JSON.parse(textResult.replace(/```json/g, '').replace(/```/g, '').trim());

                    setNewItem(prev => ({ ...prev, Name: aiData.Name || prev.Name, Category: aiData.Category || prev.Category, Description: aiData.Description || prev.Description }));

            const startVoiceSearch = (e) => {
                if (e) e.preventDefault();

                if (isListening) {
                    // Stop listening if already active (toggle behavior)
                    shouldListenRef.current = false;
                    if (recognitionRef.current) {
                        recognitionRef.current.stop();
                    }
                    setIsListening(false);
                    return;
                }

                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    showNotification(t.voiceSearchNotSupported, 'info');
                    return;
                }

                const recognition = new SpeechRecognition();
                recognitionRef.current = recognition;
                shouldListenRef.current = true;
                recognition.lang = lang === 'vi' ? 'vi-VN' : 'en-US';

                // Continuous listening keeps the mic open until manually stopped
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.maxAlternatives = 1;

                recognition.onstart = () => {
                    console.log("[VoiceSearch] 🎤 Microphone Access Granted and started listening.");
                    setIsListening(true);
                };

                recognition.onaudiostart = () => console.log("[VoiceSearch] 🔊 Audio capturing started.");
                recognition.onsoundstart = () => console.log("[VoiceSearch] 🗣️ Sound detected.");
                recognition.onspeechstart = () => console.log("[VoiceSearch] 💬 Speech detected.");

                recognition.onresult = (event) => {
                    console.log("[VoiceSearch] ✨ Result received: ", event);
                    // Combine all results (interim and final)
                    let finalTranscript = '';
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) {
                            finalTranscript += event.results[i][0].transcript;
                        } else {
                            finalTranscript += event.results[i][0].transcript;
                        }
                    }
                    console.log("[VoiceSearch] 📝 Current Transcript: ", finalTranscript);
                    // Only update if there is text, avoiding resetting it
                    if (finalTranscript.trim()) {
                        setSearchQuery(finalTranscript);
                    }
                };

                recognition.onnomatch = () => {
                    console.log("[VoiceSearch] 🤷 No speech could be confidently recognized.");
                };

                recognition.onerror = (event) => {
                    console.error('[VoiceSearch] ❌ Speech recognition error:', event.error, event);
                    if (event.error === 'not-allowed') {
                        shouldListenRef.current = false;
                        setIsListening(false);
                        showNotification("Microphone access denied.", 'error');
                    }
                };

                recognition.onend = () => {
                    // If it was supposed to keep listening but the browser aggressively stopped it, restart it automatically.
                    if (shouldListenRef.current) {
                        try {
                            recognition.start();
                        } catch (err) {
                            console.error("Failed to auto-restart recognition", err);
                            setIsListening(false);
                            shouldListenRef.current = false;
                        }
                    } else {
                        setIsListening(false);
                    }
                };

                try {
                    recognition.start();
                } catch (err) {
                    console.error("Failed to start recognition", err);
                    setIsListening(false);
                    shouldListenRef.current = false;
                }
            };

                const holdings = {};
                // Initialize everyone with empty dictionaries to track { itemID: count }
                appUsers.forEach(u => holdings[u.username] = {});

                // Transactions are sorted newest-first. We must process them chronologically (oldest-first)
                [...transactions].reverse().forEach(tx => {
                    const userName = tx.user_name; // Match the new DB field name
                    const itemId = tx.part_id;    // Match the new DB field name
                    const rawAction = (tx.action || '').toUpperCase(); // Safety check + unify case

                    if (!userName || !itemId) return; // Skip malformed records
                    if (!holdings[userName]) holdings[userName] = {};
                    if (!holdings[userName][itemId]) holdings[userName][itemId] = 0;

                    // Extract quantity from Action string like "BORROW (5)"
                    let qty = 1;
                    const qtyMatch = rawAction.match(/\((\d+)\)/);
                    if (qtyMatch) qty = parseInt(qtyMatch[1]);

                    if (rawAction.includes('BORROW')) {
                        holdings[userName][itemId] += qty;
                    } else if (rawAction.includes('RETURN')) {
                        // Smart Return: Try to subtract from the person who did it first
                        let remainingToReturn = qty;
                        if (holdings[userName][itemId] > 0) {
                            const subtract = Math.min(holdings[userName][itemId], remainingToReturn);
                            holdings[userName][itemId] -= subtract;
                            remainingToReturn -= subtract;
                        }

                        // If there's still more quantity to return, look for anyone else.
                        if (remainingToReturn > 0) {
                            Object.keys(holdings).forEach(uName => {
                                if (remainingToReturn > 0 && holdings[uName][itemId] > 0) {
                                    const subtract = Math.min(holdings[uName][itemId], remainingToReturn);
                                    holdings[uName][itemId] -= subtract;
                                    remainingToReturn -= subtract;
                                }
                            });
                        }
                    }
                });

                // RECONCILIATION STEP: Reconcile per-user counts with global synced stock
                // This handles cases where transactions might be messy or orphaned.
                const itemIds = [...new Set(items.map(i => i.id))];
                itemIds.forEach(itemId => {
                    const item = items.find(i => i.id === itemId);
                    const globalBorrowed = item ? (item.BorrowedQuantity || 0) : 0;
                    
                    // Sum up what our derived logic says users have
                    let derivedSum = 0;
                    appUsers.forEach(u => {
                        derivedSum += (holdings[u.username] && holdings[u.username][itemId]) || 0;
                    });

                    if (derivedSum !== globalBorrowed) {
                        // If global is 0, just clear everyone
                        if (globalBorrowed === 0) {
                            appUsers.forEach(u => {
                                if (holdings[u.username]) delete holdings[u.username][itemId];
                            });
                        } 
                        // If derived sum is more than global, we need to "trim" the extras
                        else if (derivedSum > globalBorrowed) {
                            let excess = derivedSum - globalBorrowed;
                            // Trim from users proportionally or just start subtracting from the first one found
                            appUsers.forEach(u => {
                                if (excess > 0 && holdings[u.username] && holdings[u.username][itemId] > 0) {
                                    const trim = Math.min(holdings[u.username][itemId], excess);
                                    holdings[u.username][itemId] -= trim;
                                    excess -= trim;
                                    if (holdings[u.username][itemId] <= 0) delete holdings[u.username][itemId];
                                }
                            });
                        }
                        // If derived sum is less than global, we have a "who has it" gap. 
                        // We could attribute to the last person who borrowed it, but that's complex.
                        // For now, we trust the logs if they are lower, OR we could attribute to a 'System' user.
                    }
                });

                // Clean up zero and negative counts
                Object.keys(holdings).forEach(uName => {
                    Object.keys(holdings[uName]).forEach(itemId => {
                        if (holdings[uName][itemId] <= 0) {
                            delete holdings[uName][itemId];
                        }
                    });
                });

                return holdings;

                                                                                localStorage.setItem('EquiLib_Items', JSON.stringify(updatedItems));

                                                                        </button>

                                            if (val === '') {
                                                setBrokenQuantityInput('');
                                                return;
                                            }
                                            const parsed = parseInt(val);
                                            const maxAvail = Math.max(0, itemToMarkBroken.TotalQuantity - (itemToMarkBroken.BorrowedQuantity || 0) - (itemToMarkBroken.BrokenQuantity || 0));

                                            <option key={u.id} value={u.id}>{u.username} ({u.role})</option>

                                                onChange={e => setCustomTesterName(e.target.value)}
                                                autoFocus
                                            />
                                        </div>

                                        {t.cancelBtn}
                                    </button>

                                        onClick={() => {
                                            if (!selectedTesterId) return;
                                            if (selectedTesterId === 'custom' && !customTesterName.trim()) return;

                                            // Execute Mark Broken Logic
                                            const qty = parseInt(brokenQuantityInput) || 1;
                                            const testerName = selectedTesterId === 'custom' ? customTesterName.trim() : (appUsers.find(u => u.id === parseInt(selectedTesterId))?.username || 'Unknown');

                                            const updatedItem = {
                                                ...itemToMarkBroken,
                                                BrokenQuantity: (itemToMarkBroken.BrokenQuantity || 0) + qty,
                                                TesterName: testerName,
                                                TesterID: selectedTesterId === 'custom' ? 'custom' : parseInt(selectedTesterId),
                                                CustomTesterName: selectedTesterId === 'custom' ? customTesterName.trim() : null
                                            };

                                            const updatedItems = items.map(i => i.id === itemToMarkBroken.id ? updatedItem : i);
                                            setItems(updatedItems);
                                            if (selectedItem && selectedItem.id === itemToMarkBroken.id) setSelectedItem(updatedItem);

                                            const newTx = {
                                                part_id: itemToMarkBroken.id,
                                                user_name: testerName,
                                                action: `MARK_BROKEN (${qty})`,
                                                timestamp: new Date().toISOString()
                                            };
                                            const updatedTxs = [newTx, ...transactions];
                                            setTransactions(updatedTxs);

                                            setCustomTesterName('');

                    }

                    {/* Mobile Bottom Navigation */}
                    <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-slate-800 border-t border-slate-700 pt-1 pb-safe z-40 flex justify-around shadow-[0_-5px_20px_rgba(0,0,0,0.3)] h-[72px]">
                        <button
                            onClick={() => setActiveTab('inventory')}
                            className={`flex-1 flex flex-col items-center py-2 px-2 ${activeTab === 'inventory' ? 'text-brand' : 'text-slate-400 hover:text-white'}`}>
                            <Icons.Box />
                            <span className="text-[10px] mt-1 font-medium">{t.inventoryTab}</span>
                        </button>
                        <button
                            onClick={() => setActiveTab('maintenance')}
                            className={`flex-1 flex flex-col items-center py-2 px-2 ${activeTab === 'maintenance' ? 'text-brand' : 'text-slate-400 hover:text-white'}`}>
                            <Icons.Wrench />
                            <span className="text-[10px] mt-1 font-medium">{t.maintenanceTab}</span>
                        </button>
                        <button
                            onClick={() => setActiveTab('logs')}
                            className={`flex-1 flex flex-col items-center py-2 px-2 ${activeTab === 'logs' ? 'text-brand' : 'text-slate-400 hover:text-white'}`}>
                            <Icons.Log />
                            <span className="text-[10px] mt-1 font-medium">{t.transactionsTab}</span>
                        </button>
                        <button
                            onClick={() => setActiveTab('users')}
                            className={`flex-1 flex flex-col items-center py-2 px-2 ${activeTab === 'users' ? 'text-brand' : 'text-slate-400 hover:text-white'}`}>
                            <Icons.Users />
                            <span className="text-[10px] mt-1 font-medium">{t.usersTab}</span>
                        </button>
                    </nav>

                    {/* Floating Action Buttons (Queues) */}
                    <div className="fixed bottom-24 right-6 md:bottom-8 md:right-8 z-40 flex flex-col items-end gap-3">
                        {/* Borrow Queue Button */}
                        {borrowCart.length > 0 && (
                            <button
                                onClick={() => setIsBorrowCartOpen(true)}
                                className="bg-emerald-500 text-white p-4 rounded-2xl shadow-2xl shadow-emerald-500/40 hover:scale-110 active:scale-95 transition-all group flex items-center gap-3"
                            >
                                <div className="relative">
                                    <Icons.ShoppingCart />
                                    <span className="absolute -top-6 -right-5 bg-white text-emerald-600 text-[10px] font-bold px-1.5 py-0.5 rounded-full border-2 border-emerald-500">
                                        {borrowCart.reduce((acc, i) => acc + i.quantity, 0)}
                                    </span>
                                </div>
                                <span className="font-bold text-sm hidden md:block">{t.borrowQueue}</span>
                            </button>
                        )}
                        {/* Return Queue Button */}
                        {returnCart.length > 0 && (
                            <button
                                onClick={() => setIsReturnCartOpen(true)}
                                className="bg-brand text-slate-900 p-4 rounded-2xl shadow-2xl shadow-brand/40 hover:scale-110 active:scale-95 transition-all group flex items-center gap-3"
                            >
                                <div className="relative">
                                    <Icons.ShoppingCart />
                                    <span className="absolute -top-6 -right-5 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full border-2 border-brand">
                                        {returnCart.reduce((acc, i) => acc + i.quantity, 0)}
                                    </span>
                                </div>
                                <span className="font-bold text-sm hidden md:block">{t.returnQueue}</span>
                            </button>
                        )}
                    </div>

                    {/* Borrow Cart Modal */}
                    {isBorrowCartOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[60] flex items-center justify-center p-4 animate-fade-in">
                            <div className="bg-slate-800 border border-slate-700 rounded-3xl p-6 md:p-8 w-full max-w-lg shadow-2xl animate-scale-up relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-1 bg-emerald-500"></div>
                                <div className="flex justify-between items-center mb-6">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-emerald-500/20 p-2 rounded-xl text-emerald-500">
                                            <Icons.ShoppingCart />
                                        </div>
                                        <h3 className="text-xl font-extrabold text-white">{t.borrowQueue}</h3>
                                    </div>
                                    <button onClick={() => setIsBorrowCartOpen(false)} className="text-slate-400 hover:text-white p-2">✕</button>
                                </div>

                                <div className="space-y-3 max-h-[50vh] overflow-y-auto pr-2 custom-scrollbar mb-8">
                                    {borrowCart.length === 0 ? (
                                        <div className="text-center py-10 text-slate-500 font-medium">{t.emptyBorrowQueue}</div>
                                    ) : borrowCart.map(item => (
                                        <div key={item.id} className="flex items-center justify-between bg-slate-900/50 p-4 rounded-2xl border border-slate-700/50 group hover:border-emerald-500/30 transition-colors">
                                            <div className="flex flex-col">
                                                <span className="font-bold text-white group-hover:text-emerald-500 transition-colors">{item.Name}</span>
                                                <span className="text-xs text-slate-500 font-mono mt-0.5">{item.Barcode}</span>
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <div className="flex items-center gap-3 bg-slate-800 rounded-xl p-1 border border-slate-700">
                                                    <button onClick={() => removeFromBorrowCart(item.id)} className="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-700 text-slate-300">-</button>
                                                    <span className="font-bold text-white w-4 text-center">{item.quantity}</span>
                                                    <button onClick={() => addToBorrowCart(item)} className="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-700 text-slate-300">+</button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="flex flex-col gap-3">
                                    <button
                                        onClick={handleBulkBorrow}
                                        disabled={borrowCart.length === 0}
                                        className="w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-white font-black rounded-2xl transition-all shadow-xl shadow-emerald-500/20 disabled:opacity-50 disabled:grayscale flex items-center justify-center gap-2 group"
                                    >
                                        {t.processBorrow}
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="group-hover:translate-x-1 transition-transform"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                                    </button>
                                    <button onClick={() => setIsBorrowCartOpen(false)} className="w-full py-3 text-slate-400 hover:text-white font-bold transition-colors">
                                        {t.cancel}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Return Cart Modal */}
                    {isReturnCartOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-md z-[60] flex items-center justify-center p-4 animate-fade-in">
                            <div className="bg-slate-800 border border-slate-700 rounded-3xl p-6 md:p-8 w-full max-w-lg shadow-2xl animate-scale-up relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-1 bg-brand"></div>
                                <div className="flex justify-between items-center mb-6">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-brand/20 p-2 rounded-xl text-brand">
                                            <Icons.ShoppingCart />
                                        </div>
                                        <h3 className="text-xl font-extrabold text-white">{t.returnQueue}</h3>
                                    </div>
                                    <button onClick={() => setIsReturnCartOpen(false)} className="text-slate-400 hover:text-white p-2">✕</button>
                                </div>

                                <div className="space-y-3 max-h-[50vh] overflow-y-auto pr-2 custom-scrollbar mb-8">
                                    {returnCart.length === 0 ? (
                                        <div className="text-center py-10 text-slate-500 font-medium">{t.emptyQueue}</div>
                                    ) : returnCart.map(item => (
                                        <div key={item.id} className="flex items-center justify-between bg-slate-900/50 p-4 rounded-2xl border border-slate-700/50 group hover:border-brand/30 transition-colors">
                                            <div className="flex flex-col">
                                                <span className="font-bold text-white group-hover:text-brand transition-colors">{item.Name}</span>
                                                <span className="text-xs text-slate-500 font-mono mt-0.5">{item.Barcode}</span>
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <div className="flex items-center gap-3 bg-slate-800 rounded-xl p-1 border border-slate-700">
                                                    <button onClick={() => removeFromReturnCart(item.id)} className="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-700 text-slate-300">-</button>
                                                    <span className="font-bold text-white w-4 text-center">{item.quantity}</span>
                                                    <button onClick={() => addToReturnCart(item)} className="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-700 text-slate-300">+</button>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="flex flex-col gap-3">
                                    <button
                                        onClick={handleBulkReturn}
                                        disabled={returnCart.length === 0}
                                        className="w-full py-4 bg-brand hover:bg-brand-dark text-slate-900 font-black rounded-2xl transition-all shadow-xl shadow-brand/20 disabled:opacity-50 disabled:grayscale flex items-center justify-center gap-2 group"
                                    >
                                        {t.processReturn}
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="group-hover:translate-x-1 transition-transform"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                                    </button>
                                    <button onClick={() => setIsReturnCartOpen(false)} className="w-full py-3 text-slate-400 hover:text-white font-bold transition-colors">
                                        {t.cancel}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Add Location Modal */}
                    {isAddLocationModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[70] flex p-4 items-center justify-center animate-fade-in" onMouseDown={(e) => { if (e.target === e.currentTarget) setIsAddLocationModalOpen(false) }}>
                            <div className="bg-slate-800 w-full max-w-sm rounded-2xl p-6 border border-slate-700 shadow-2xl relative animate-scale-up" onMouseDown={e => e.stopPropagation()}>
                                <h3 className="text-xl font-bold text-white mb-6 flex gap-2 items-center"><Icons.Plus /> {lang === 'en' ? 'Add New Shelf' : 'Thêm vị trí mới'}</h3>
                                <form onSubmit={handleAddLocationSubmit} className="space-y-4">
                                    <div>
                                        <label className="block text-sm text-slate-400 mb-2">{lang === 'en' ? 'Shelf Name' : 'Tên vị trí'}</label>
                                        <input
                                            required
                                            type="text"
                                            placeholder={lang === 'en' ? 'e.g. A-A5' : 'VD: A-A5'}
                                            value={newLocationForm.ShelfLabel}
                                            onChange={e => setNewLocationForm({ ...newLocationForm, ShelfLabel: e.target.value })}
                                            className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-brand"
                                        />
                                    </div>
                                    <div className="flex justify-end gap-3 mt-6 pt-4 border-t border-slate-700">
                                        <button
                                            type="button"
                                            onClick={() => setIsAddLocationModalOpen(false)}
                                            className="px-4 py-2 text-slate-400 hover:text-white transition-colors font-medium"
                                        >
                                            {t.cancelBtn || (lang === 'en' ? 'Cancel' : 'Hủy')}
                                        </button>
                                        <button
                                            type="submit"
                                            className="bg-brand hover:bg-brand-dark font-bold px-6 py-2 rounded-lg text-slate-900 shadow-lg transition-colors"
                                        >
                                            {t.saveBtn || (lang === 'en' ? 'Save' : 'Lưu')}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Drag and Drop Overlay */}
                    <DropZoneOverlay 
                        draggedItem={draggedItem}
                        activeDropZone={activeDropZone}
                        onDragOver={onDragOver}
                        onDragLeave={onDragLeave}
                        onDrop={onDrop}
                        t={t}
                    />
                </div >
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>

</html>
