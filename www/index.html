        /* Barcode Scanner Reticle Overlay */
        .scanner-reticle {
            position: absolute;
            top: 50%;
            left: 50%;

            height: 120px;
            border: 2px solid rgba(255, 255, 255, 0.3);

    <!-- Database Services Pointed to Local Python API -->
    <script>
        let API_BASE = 'http://14.224.194.242:5007/api';

        const fetchJson = async (url, options = {}) => {
            try {
                // Ensure headers exist
                options.headers = options.headers || {};
                // Bypass localtunnel's anti-phishing HTML intercept page for API fetches
                options.headers['Bypass-Tunnel-Reminder'] = 'true';
                options.headers['ngrok-skip-browser-warning'] = 'true';

                const res = await fetch(url, options);
                let text = await res.text();
                let json;
                try {
                    json = JSON.parse(text);
                } catch (e) {
                    // If it's not JSON (like an HTML error page), reject it
                    throw new Error("API returned non-JSON response: " + text.substring(0, 100));
                }
                if (!res.ok) throw new Error(json.error || json.message || 'HTTP Error ' + res.status);
                return { data: json.data || json, error: json.error };
            } catch (err) {
                return { data: null, error: err };
            }
        };

        window.dbServices = {
            getLocations: () => fetchJson(`${API_BASE}/locations`),
            getItems: () => fetchJson(`${API_BASE}/items`),
            getTransactions: () => fetchJson(`${API_BASE}/transactions`),
            getUsers: () => fetchJson(`${API_BASE}/users`),
            updateItemBorrowedQuantity: (itemId, newQuantity) => fetchJson(`${API_BASE}/items/${itemId}`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({
                    BorrowedQuantity: newQuantity
                })
            }),
            updateItemTotalQuantity: (itemId, newQuantity) => fetchJson(`${API_BASE}/items/${itemId}`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ TotalQuantity: newQuantity })
            }),
            deleteItem: (itemId) => fetchJson(`${API_BASE}/items/${itemId}`, { method: 'DELETE' }),
            updateItem: (itemId, itemData) => fetchJson(`${API_BASE}/items/${itemId}`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(itemData)
            }),
            insertTransaction: (transactionData) => fetchJson(`${API_BASE}/transactions`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(transactionData)
            }),
            createItem: (itemData) => fetchJson(`${API_BASE}/items`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(itemData)
            }),
            createUser: (userData) => fetchJson(`${API_BASE}/users`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(userData)
            }),
            subscribeToItems: (callback) => {
                // Mock Realtime Subscription for Local
                return { unsubscribe: () => { } };
            }
        };
    </script>

        window.onerror = function (msg, url, line, col, error) {
            document.body.innerHTML += '<div style="color:red; background:white; padding:20px; position:absolute; z-index:9999; top:0; left:0; right:0; font-family:monospace; word-break: break-all;"><b>FATAL ERROR:</b> ' + msg + '<br>Line: ' + line + '<br>Col: ' + col + '<br>Error Obj: ' + (error ? (error.stack || error.message || JSON.stringify(error)) : '') + '</div>';
        };
        window.addEventListener('unhandledrejection', function (event) {
            let reasonStr = 'Unknown';
            if (event.reason) {
                if (event.reason instanceof Error) reasonStr = event.reason.stack || event.reason.message;
                else if (typeof event.reason === 'object') reasonStr = JSON.stringify(event.reason);
                else reasonStr = String(event.reason);
            }
            document.body.innerHTML += '<div style="color:red; background:white; padding:20px; position:absolute; z-index:9999; top:100px; left:0; right:0; font-family:monospace; word-break: break-all;"><b>PROMISE REJECTION:</b> ' + reasonStr + '</div>';
        });
    </script>

            const fetchData = async () => {

                    if (!localStorage.getItem('equilibr_Patch_v3')) {
                        localStorage.removeItem('equilibr_Items');
                        localStorage.removeItem('equilibr_Users');
                        localStorage.removeItem('equilibr_Transactions');
                        localStorage.setItem('equilibr_Patch_v3', 'true');
                        // return to force reload with clean state next frame
                        setTimeout(() => window.location.reload(), 100);
                        return;
                    }

                    // 1. Load from Local Cache instantly
                    const localItems = localStorage.getItem('equilibr_Items');
                    const localUsers = localStorage.getItem('equilibr_Users');
                    const localTransactions = localStorage.getItem('equilibr_Transactions');

                    const parsedLocalItems = localItems ? JSON.parse(localItems) : null;
                    const parsedLocalUsers = localUsers ? JSON.parse(localUsers) : null;
                    const parsedLocalTransactions = localTransactions ? JSON.parse(localTransactions) : null;

                    if (parsedLocalItems) setItems(parsedLocalItems);
                    if (parsedLocalUsers) setAppUsers(parsedLocalUsers);
                    if (parsedLocalTransactions) setTransactions(parsedLocalTransactions);

                    // 2. Attempt to fetch from Database Services Middleman
                    const { data: locData, error: locError } = await window.dbServices.getLocations();
                    const { data: itemData, error: itemError } = await window.dbServices.getItems();
                    const { data: transData, error: transError } = await window.dbServices.getTransactions();
                    const { data: userData, error: userError } = await window.dbServices.getUsers();

                    // If tables don't exist yet, it will error out. We fallback to mock data.
                    if (locError || itemError || userError) {
                        console.warn('Supabase connection failed or tables missing. Falling back to Local Backup cache.');
                        alert("Cloud Sync Unavailable: Loading from local backup. Changes made while offline may not sync to other devices.");

                        setItems(parsedLocalItems || MOCK_ITEMS);
                        setAppUsers(parsedLocalUsers || MOCK_USERS);
                        setTransactions(parsedLocalTransactions || MOCK_TRANSACTIONS);

                        if (!parsedLocalItems) localStorage.setItem('equilibr_Items', JSON.stringify(MOCK_ITEMS));
                    } else {
                        // Supabase Call Succeeded! It is the single source of truth.

                        // Scenario: First time connecting to a fresh DB. Supabase is empty, but we have local data.
                        // We will upload local data to Supabase to prevent data loss.
                        let finalUsers = userData;
                        let finalItems = itemData;
                        let finalTransactions = transData;
                        let finalLocations = (locData && locData.length > 0) ? locData : MOCK_LOCATIONS;

                        // Auto-Migration Check for fresh DBs
                        const isDbEmpty = (!itemData || itemData.length === 0) && (!userData || userData.length === 0);
                        const hasLocalData = (parsedLocalItems && parsedLocalItems.length > 0) && (parsedLocalItems[0].id !== MOCK_ITEMS[0].id);

                        if (isDbEmpty && hasLocalData) {
                            console.log("Empty cloud database detected. Migrating local data to cloud...");

                            // Use local data for the UI immediately
                            finalItems = parsedLocalItems;
                            finalUsers = parsedLocalUsers || MOCK_USERS;
                            finalTransactions = parsedLocalTransactions || [];

                            // Background Migration to Supabase

                                for (let item of finalItems) {
                                    // Remove local 'id' so Supabase generates a real one, or if using explicit IDs, keep them depending on schema
                                    const { id, ...itemToInsert } = item;
                                    window.dbServices.createItem(itemToInsert).catch(e => console.error("Migration err:", e));
                                }
                            }
                        } else {
                            // Normal Flow: Trust Supabase
                            if (!finalUsers || finalUsers.length === 0) finalUsers = MOCK_USERS; // Ensure we always have login users
                            if (!finalItems) finalItems = [];
                            if (!finalTransactions) finalTransactions = [];
                        }

                        setLocations(finalLocations);
                        setItems(finalItems);
                        setTransactions(finalTransactions);
                        setAppUsers(finalUsers);

                        // Update local backup cache
                        localStorage.setItem('equilibr_Items', JSON.stringify(finalItems));
                        localStorage.setItem('equilibr_Users', JSON.stringify(finalUsers));
                        localStorage.setItem('equilibr_Transactions', JSON.stringify(finalTransactions));
                    }

                    setItems(items => items.length === 0 ? MOCK_ITEMS : items);
                    setAppUsers(users => users.length === 0 ? MOCK_USERS : users);
                    setTransactions(txs => txs.length === 0 ? MOCK_TRANSACTIONS : txs);
                    setLocations(locs => locs.length === 0 ? MOCK_LOCATIONS : locs);

                    setLoading(false);

            const handleBorrow = async (e, item, borrowQty = 1) => {
                if (e) e.stopPropagation(); // prevent row click
                if (item.TotalQuantity - (item.BorrowedQuantity || 0) - (item.BrokenQuantity || 0) < borrowQty) {
                    alert(t.outOfStockAlert);
                    return;
                }

                const newBorrowedQty = (item.BorrowedQuantity || 0) + borrowQty;
                const newlyUpdatedItem = { ...item, BorrowedQuantity: newBorrowedQty };

                // Update local state and cache immediately for snappy UX
                const updatedItems = items.map(i => i.id === item.id ? newlyUpdatedItem : i);
                setItems(updatedItems);

                // Keep the detail view in sync
                if (selectedItem && selectedItem.id === item.id) {
                    setSelectedItem(newlyUpdatedItem);
                }

                // Log one transaction per borrow action (grouped)
                const newTx = {
                    ItemID: item.id,
                    UserID: currentUser ? currentUser.id : 1,
                    Action: borrowQty > 1 ? `BORROW (${borrowQty})` : 'BORROW',
                    Timestamp: new Date().toISOString()
                };
                const updatedTransactions = [newTx, ...transactions];
                setTransactions(updatedTransactions);

                // Save to cache
                localStorage.setItem('equilibr_Items', JSON.stringify(updatedItems));
                localStorage.setItem('equilibr_Transactions', JSON.stringify(updatedTransactions));

                // Try to update via Database Services
                if (window.dbServices) {
                    await window.dbServices.updateItemBorrowedQuantity(item.id, newBorrowedQty);
                    await window.dbServices.insertTransaction(newTx);
                }
            };

                    Action: returnQty > 1 ? `RETURN (${returnQty})` : 'RETURN',
                    Timestamp: new Date().toISOString()
                };

            const analyzeImageWithAI = async (base64Image, apiKey) => {
                setIsAnalyzing(true);
                try {
                    // Extract base64 without prefix
                    const base64Content = base64Image.split(',')[1];
                    const promptText = "Analyze this image of a tool, piece of equipment, or object. Respond in JSON format with exactly three fields: 'Name' (the specific brand and model if visible, else generic name), 'Category' (e.g. Power Tools, Hand Tools, Electronics, Consumables, Accessories), and 'Description' (a brief 1-sentence physical description). Return ONLY raw JSON, do not include markdown blocks or any other characters.";

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: promptText }, { inline_data: { mime_type: "image/jpeg", data: base64Content } }] }],
                            generationConfig: { response_mime_type: "application/json" }
                        })
                    });

                    if (!response.ok) throw new Error("API Request Failed");
                    const result = await response.json();

                    const textResult = result.candidates[0].content.parts[0].text;
                    const aiData = JSON.parse(textResult.replace(/```json/g, '').replace(/```/g, '').trim());

                    setNewItem(prev => ({ ...prev, Name: aiData.Name || prev.Name, Category: aiData.Category || prev.Category, Description: aiData.Description || prev.Description }));
                    alert(t.aiSuccess);

                    alert(t.aiFailed);
                } finally {
                    setIsAnalyzing(false);
                }

            const startVoiceSearch = (e) => {
                if (e) e.preventDefault();

                if (isListening) {
                    // Stop listening if already active (toggle behavior)
                    shouldListenRef.current = false;
                    if (recognitionRef.current) {
                        recognitionRef.current.stop();
                    }
                    setIsListening(false);
                    return;
                }

                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    alert(t.voiceSearchNotSupported);
                    return;
                }

                const recognition = new SpeechRecognition();
                recognitionRef.current = recognition;
                shouldListenRef.current = true;
                recognition.lang = lang === 'vi' ? 'vi-VN' : 'en-US';

                // Continuous listening keeps the mic open until manually stopped
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.maxAlternatives = 1;

                recognition.onstart = () => {
                    console.log("[VoiceSearch] 🎤 Microphone Access Granted and started listening.");
                    setIsListening(true);
                };

                recognition.onaudiostart = () => console.log("[VoiceSearch] 🔊 Audio capturing started.");
                recognition.onsoundstart = () => console.log("[VoiceSearch] 🗣️ Sound detected.");
                recognition.onspeechstart = () => console.log("[VoiceSearch] 💬 Speech detected.");

                recognition.onresult = (event) => {
                    console.log("[VoiceSearch] ✨ Result received: ", event);
                    // Combine all results (interim and final)
                    let finalTranscript = '';
                    for (let i = event.resultIndex; i < event.results.length; ++i) {
                        if (event.results[i].isFinal) {
                            finalTranscript += event.results[i][0].transcript;
                        } else {
                            finalTranscript += event.results[i][0].transcript;
                        }
                    }
                    console.log("[VoiceSearch] 📝 Current Transcript: ", finalTranscript);
                    // Only update if there is text, avoiding resetting it
                    if (finalTranscript.trim()) {
                        setSearchQuery(finalTranscript);
                    }
                };

                recognition.onnomatch = () => {
                    console.log("[VoiceSearch] 🤷 No speech could be confidently recognized.");
                };

                recognition.onerror = (event) => {
                    console.error('[VoiceSearch] ❌ Speech recognition error:', event.error, event);
                    if (event.error === 'not-allowed') {
                        shouldListenRef.current = false;
                        setIsListening(false);
                        alert("Microphone access denied.");
                    }
                };

                recognition.onend = () => {
                    // If it was supposed to keep listening but the browser aggressively stopped it, restart it automatically.
                    if (shouldListenRef.current) {
                        try {
                            recognition.start();
                        } catch (err) {
                            console.error("Failed to auto-restart recognition", err);
                            setIsListening(false);
                            shouldListenRef.current = false;
                        }
                    } else {
                        setIsListening(false);
                    }
                };

                try {
                    recognition.start();
                } catch (err) {
                    console.error("Failed to start recognition", err);
                    setIsListening(false);
                    shouldListenRef.current = false;
                }
            };

            // Calculate active holdings per user, including quantities
            const userHoldings = useMemo(() => {
                const holdings = {};
                // Initialize everyone with empty dictionaries to track { itemID: count }
                appUsers.forEach(u => holdings[u.id] = {});

                // Transactions are sorted newest-first. We must process them chronologically (oldest-first)
                // so that we don't accidentally drop items if a return happens before a borrow in our loop.
                [...transactions].reverse().forEach(tx => {
                    const userId = tx.UserID;
                    const itemId = tx.ItemID;
                    if (!holdings[userId]) holdings[userId] = {};
                    if (!holdings[userId][itemId]) holdings[userId][itemId] = 0;

                    // Extract quantity from Action string like "BORROW (5)" or "RETURN (3)"
                    let qty = 1;
                    const qtyMatch = tx.Action.match(/\((\d+)\)/);
                    if (qtyMatch) qty = parseInt(qtyMatch[1]);

                    if (tx.Action.startsWith('BORROW')) {
                        holdings[userId][itemId] += qty;
                    } else if (tx.Action.startsWith('RETURN')) {
                        // Smart Return: Try to subtract from the person who did it first
                        let remainingToReturn = qty;
                        if (holdings[userId][itemId] > 0) {
                            const subtract = Math.min(holdings[userId][itemId], remainingToReturn);
                            holdings[userId][itemId] -= subtract;
                            remainingToReturn -= subtract;
                        }

                        // If there's still more quantity to return (e.g. Admin returning for Binh)
                        // look for anyone else who holds this item.
                        if (remainingToReturn > 0) {
                            Object.keys(holdings).forEach(uId => {
                                if (remainingToReturn > 0 && holdings[uId][itemId] > 0) {
                                    const subtract = Math.min(holdings[uId][itemId], remainingToReturn);
                                    holdings[uId][itemId] -= subtract;
                                    remainingToReturn -= subtract;
                                }
                            });
                        }
                    }
                });

                // Clean up zero and negative counts
                Object.keys(holdings).forEach(userId => {
                    Object.keys(holdings[userId]).forEach(itemId => {
                        if (holdings[userId][itemId] <= 0) {
                            delete holdings[userId][itemId];
                        }
                    });
                });

                return holdings;
            }, [transactions, appUsers]);

                                                onChange={e => setCustomTesterName(e.target.value)}

                                        </div>

                                            const finalTesterId = selectedTesterId === 'custom' ? 'custom' : parseInt(selectedTesterId);

                                            const updatedItem = {
                                                ...itemToMarkBroken,
                                                BrokenQuantity: (itemToMarkBroken.BrokenQuantity || 0) + qty,
                                                TesterID: finalTesterId,
                                                CustomTesterName: selectedTesterId === 'custom' ? customTesterName.trim() : null

                                            const updatedItems = items.map(i => i.id === itemToMarkBroken.id ? updatedItem : i);
                                            setItems(updatedItems);
                                            if (selectedItem && selectedItem.id === itemToMarkBroken.id) setSelectedItem(updatedItem);

                                            const newTx = {
                                                ItemID: itemToMarkBroken.id,
                                                UserID: finalTesterId,
                                                Action: `MARK_BROKEN (${qty})`,
                                                Timestamp: new Date().toISOString()
                                            };
                                            const updatedTxs = [newTx, ...transactions];
                                            setTransactions(updatedTxs);

                                            localStorage.setItem('equilibr_Items', JSON.stringify(updatedItems));
                                            localStorage.setItem('equilibr_Transactions', JSON.stringify(updatedTxs));

                                            if (window.dbServices && window.dbServices.updateItem) {
                                                window.dbServices.updateItem(itemToMarkBroken.id, updatedItem);
                                                window.dbServices.insertTransaction(newTx);
                                            }

                                            setIsAssignTesterModalOpen(false);
                                            setBrokenQuantityInput(1);
                                            setCustomTesterName('');

                                                {isAnalyzing && (
                                                    <div className="absolute inset-0 bg-slate-900/80 flex flex-col items-center justify-center backdrop-blur-sm z-10 transition-all">
                                                        <div className="animate-spin rounded-full h-8 w-8 border-t-2 border-b-2 border-brand mb-2 shadow-[0_0_15px_rgba(245,158,11,0.5)]"></div>
                                                        <span className="text-brand text-xs font-bold animate-pulse tracking-widest uppercase">{t.analyzing}</span>
                                                    </div>
                                                )}
                                                <input id="camera-capture" type="file" accept="image/*" capture="environment" className="hidden" onChange={handleImageCapture} />
                                            </label>
                                        </div>

                                        <div>
                                            <label className="block text-sm text-slate-400 mb-1">{t.itemBarcode}</label>
                                            <input required type="text" value={newItem.Barcode} onChange={e => setNewItem({ ...newItem, Barcode: e.target.value })} className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-brand transition-colors" />
                                        </div>
                                        <div>
                                            <label className="block text-sm text-slate-400 mb-1">{t.itemName}</label>
                                            <input required type="text" value={newItem.Name} onChange={e => setNewItem({ ...newItem, Name: e.target.value })} className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-brand transition-colors" />
                                        </div>
                                        <div>
                                            <label className="block text-sm text-slate-400 mb-1">{t.category}</label>
                                            <input required type="text" value={newItem.Category} onChange={e => setNewItem({ ...newItem, Category: e.target.value })} className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-brand" />
                                        </div>
                                        <div>
                                            <label className="block text-sm text-slate-400 mb-1">{t.itemDesc}</label>
                                            <textarea value={newItem.Description} onChange={e => setNewItem({ ...newItem, Description: e.target.value })} className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-brand" rows="2"></textarea>
                                        </div>
                                        <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                            <div className="col-span-2 md:col-span-1">
                                                <label className="block text-sm text-slate-400 mb-1">Giá / Price (VND)</label>
                                                <input type="number" min="0" value={newItem.PriceVND} onChange={e => setNewItem({ ...newItem, PriceVND: e.target.value })} className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-brand" placeholder="0" />
                                            </div>
                                            <div>
                                                <label className="block text-sm text-slate-400 mb-1">{t.qty}</label>
                                                <input required type="number" min="1" value={newItem.TotalQuantity} onChange={e => setNewItem({ ...newItem, TotalQuantity: e.target.value })} className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-brand" />
                                            </div>
                                            <div>
                                                <label className="block text-sm text-slate-400 mb-1">{t.selectLocation}</label>
                                                <select required value={newItem.LocationID} onChange={e => setNewItem({ ...newItem, LocationID: e.target.value })} className="w-full bg-slate-900 border border-slate-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-brand appearance-none">
                                                    <option value="" disabled>{t.selectLocation}</option>
                                                    {locations.filter(loc => loc.ShelfLabel.includes('-')).map(loc => (
                                                        <option key={loc.id} value={loc.id}>
                                                            {lang === 'en' && loc.ShelfLabelEn ? loc.ShelfLabelEn : loc.ShelfLabel}
                                                        </option>
                                                    ))}
                                                </select>
                                            </div>
                                        </div>
                                        <div className="flex gap-4 mt-8 pt-4 border-t border-slate-700">
                                            <button type="button" onClick={() => { setIsAddModalOpen(false); setIsEditing(false); setNewItem({ Barcode: '', Name: '', Description: '', Category: '', TotalQuantity: 1, LocationID: '', PriceVND: '', ImageFile: null, ImagePreview: null }); }} className="flex-1 py-3 bg-slate-700 hover:bg-slate-600 text-white font-bold rounded-lg transition-colors">{t.cancel}</button>
                                            <button type="submit" className="flex-1 py-3 bg-brand text-slate-900 font-bold rounded-lg hover:bg-brand-dark transition-colors">{t.saveBtn}</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )
                    }

                    {/* Mobile Bottom Navigation */}
                    <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-slate-800 border-t border-slate-700 pt-1 pb-safe z-40 flex justify-around shadow-[0_-5px_20px_rgba(0,0,0,0.3)] h-[72px]">
                        <button
                            onClick={() => setActiveTab('inventory')}
                            className={`flex-1 flex flex-col items-center py-2 px-2 ${activeTab === 'inventory' ? 'text-brand' : 'text-slate-400 hover:text-white'}`}>
                            <Icons.Box />
                            <span className="text-[10px] mt-1 font-medium">{t.inventoryTab}</span>
                        </button>
                        <button
                            onClick={() => setActiveTab('logs')}
                            className={`flex-1 flex flex-col items-center py-2 px-2 ${activeTab === 'logs' ? 'text-brand' : 'text-slate-400 hover:text-white'}`}>
                            <Icons.Log />
                            <span className="text-[10px] mt-1 font-medium">{t.transactionsTab}</span>
                        </button>
                        <button
                            onClick={() => {
                                if ((currentUser?.role || '').toLowerCase() === 'admin') {
                                    setActiveTab('users')
                                } else {
                                    handleLogout()
                                }
                            }}
                            className={`flex-1 flex flex-col items-center py-2 px-2 ${activeTab === 'users' ? 'text-brand' : 'text-slate-400 hover:text-white'}`}>
                            {((currentUser?.role || '').toLowerCase() === 'admin') ? (
                                <>
                                    <Icons.Users />
                                    <span className="text-[10px] mt-1 font-medium">{t.usersTab}</span>
                                </>
                            ) : (
                                <>
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                                    <span className="text-[10px] mt-1 font-medium">{t.logout}</span>
                                </>
                            )}
                        </button>
                    </nav>
                </div >
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>

</html>
